              <p>Der empfohlene Ort zum Hinzufügen ist <span class="label">app/views/layouts/decidim/_head_extra.html.erb</span> oder in Header-Snippets (falls aktiviert).</p>
              <p>Beispiel:</p><br><pre>%{example}</pre><br>
              <p>Ohne <code>type="text/plain"</code> hat die Daten-Einwilligungseinstellung des Benutzers keine Wirkung.<br>Mehr dazu: <a href="https://docs.decidim.org/en/develop/customize/data_consent.html#_adding_scripts_which_require_data_consent" target="_blank" rel="noopener">Adding scripts which require data consent</a>.</p>

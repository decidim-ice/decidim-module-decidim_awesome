              Cookie-Kategorien und -Einträge steuern ausschließlich die Einwilligungsoberfläche und die Dokumentation.<br>
              Damit Einstellungen wirksam werden, müssen Drittanbieter-Skripte und -Dienste so konfiguriert sein, dass sie erst nach erteilter Einwilligung geladen werden.<br>
              Diese zusätzliche Skriptkonfiguration ist für eingebettete Video-iFrames nicht erforderlich, da Decidim bereits eine integrierte Einwilligungsverwaltung für diese Einbettungen enthält.<br>

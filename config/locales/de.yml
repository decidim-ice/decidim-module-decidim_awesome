        cookie_items:
          cookie_item_presets:
            explanations:
              cloudflare_turnstile: |-
                Fügen Sie diese Cookies hinzu, wenn Cloudflare Turnstile aktiviert ist, um Formulare vor Missbrauch und automatisiertem Verkehr zu schützen. Sie unterstützen die Bot-Erkennung, Sitzungsvalidierung und die Kontinuität der Challenge.

                Empfohlene Kategorie: Essenziell
              decidim_essential: |-
                Fügen Sie diese essenziellen Cookies hinzu, die für die Kernfunktionalität Ihrer Decidim-Plattform erforderlich sind. Diese Cookies ermöglichen die Benutzerauthentifizierung, Sitzungsverwaltung und Einwilligungsverfolgung.

                Empfohlene Kategorie: Essenziell
              emoji_picker: |-
                Fügen Sie dieses Cookie hinzu, wenn Sie die Emoji-Picker-Funktion in Texteditoren aktivieren. Es speichert zuletzt verwendete Emojis zur Personalisierung der Nutzererfahrung.

                Empfohlene Kategorie: Präferenzen
              facebook_pixel: |-
                Fügen Sie diese Cookies hinzu, wenn Sie Meta (Facebook) Pixel für Conversion-Tracking oder Anzeigenattribution verwenden. Sie helfen dabei, Browser-Sitzungen zu identifizieren und die Kampagnenleistung zu messen.

                Empfohlene Kategorie: Marketing
              google_analytics: |-
                Fügen Sie diese Cookies hinzu, wenn Sie Google Analytics (GA4/gtag.js) zur Messung von Traffic und Nutzerverhalten verwenden. Sie identifizieren Besucher, unterscheiden Sitzungen und helfen bei der Erstellung von Nutzungsstatistiken.

                Empfohlene Kategorie: Analyse
              google_maps_embeds: |-
                Fügen Sie diese Cookies hinzu, wenn Sie Google Maps auf Ihren Seiten einbetten (z. B. Karten-Widgets oder Standort-Blöcke). Sie helfen bei Kartenpräferenzen, Einwilligungsstatus und Nutzungsmetriken.

                Empfohlene Kategorie: Präferenzen oder Analyse
              google_tag_manager: |-
                Fügen Sie diese Cookies hinzu, wenn Ihre Analyse- oder Marketing-Tags über Google Tag Manager bereitgestellt werden. Einige Tags können je nach GTM-Konfiguration zusätzliche Tracking-Cookies setzen.

                Empfohlene Kategorie: Analyse oder Marketing
              graphiql: |-
                Fügen Sie diese Cookies hinzu, wenn Sie den GraphQL-API-Explorer (/api/graphiql) für Entwickler aktivieren. Sie speichern die Oberflächen-Einstellungen des Explorers, den Abfrageverlauf und Tab-Konfigurationen.

                Empfohlene Kategorie: Präferenzen
              hcaptcha: |-
                Fügen Sie diese Cookies/Speichereinträge hinzu, wenn hCaptcha in Formularen aktiviert ist. Sie werden für Bot-Erkennung, Barrierefreiheitsoptionen und Challenge-/Sitzungsverwaltung verwendet.

                Empfohlene Kategorie: Essenziell
              jitsi_meet: |-
                Fügen Sie diese Cookies hinzu, wenn Sie Jitsi Meet-Videokonferenzen in Ihre Plattform integrieren. Sie speichern Benutzereinstellungen, Sprachpräferenzen, Videoqualitätsoptionen und Sitzungsdaten für den Videokonferenzdienst.

                Empfohlene Kategorie: Präferenzen
              linkedin_insight: |-
                Fügen Sie diese Cookies hinzu, wenn Sie den LinkedIn Insight Tag verwenden, um Kampagnenleistung und Besucher-Conversions aus LinkedIn-Anzeigen zu messen.

                Empfohlene Kategorie: Marketing
              matomo: |-
                Fügen Sie diese Cookies hinzu, wenn Sie Matomo Analytics zur Website-Statistikerfassung verwenden. Sie identifizieren wiederkehrende Besucher, verfolgen Sitzungen und speichern Referral-Informationen für aggregierte Berichte.

                Empfohlene Kategorie: Analyse
              openstreetmap_tiles: |-
                Fügen Sie diese Cookies hinzu, wenn Ihre Kartenerfahrung von bei OpenStreetMap gehosteten Ressourcen abhängt, die Cookies setzen können (z. B. eingebettete Karten oder OSM-kontobezogene Funktionen).

                Empfohlene Kategorie: Präferenzen
              recaptcha: |-
                Fügen Sie diese Cookies/Speichereinträge hinzu, wenn Google reCAPTCHA Formulare vor Missbrauch und Bots schützt. Sie helfen dabei, Nutzerinteraktionen und Sicherheitssignale auszuwerten.

                Empfohlene Kategorie: Essenziell
              vimeo_embeds: |-
                Fügen Sie diese Cookies hinzu, wenn Sie Vimeo-Videos in Seiten, Vorschläge oder Kommentare einbetten. Vimeo kann sie verwenden, um Player-Einstellungen zu speichern und Wiedergabe-Interaktionen zu messen.

                Empfohlene Kategorie: Präferenzen oder Analyse
              youtube_nocookie: |-
                Fügen Sie diese Speicherschlüssel hinzu, wenn Sie den datenschutzoptimierten Modus von YouTube (youtube-nocookie.com) verwenden. Sie werden verwendet, um den Player-Status und Geräte-/Sitzungseinstellungen beizubehalten.

                Empfohlene Kategorie: Präferenzen
              youtube_embeds: |-
                Fügen Sie diese Cookies hinzu, wenn Sie YouTube-Video-Einbettungen in Inhalten (Vorschläge, Kommentare usw.) erlauben. YouTube setzt Analyse- und Tracking-Cookies, die Informationen über die Videowiedergabe und das Nutzerverhalten erfassen.

                Empfohlene Kategorie: Präferenzen (wenn Videos integraler Bestandteil des Inhalts sind), Analyse (für Tracking/Statistiken) oder Marketing (für Werbezwecke)
            descriptions:
              turnstile_cf_bm: Hilft Cloudflare, automatisierten Datenverkehr zu erkennen und zu mindern.
              turnstile_cfuvid: Hilft Cloudflare, einzelne Benutzer zu unterscheiden, die dieselbe IP-Adresse verwenden.
              turnstile_cf_clearance: Speichert den Nachweis, dass ein Besucher eine vorherige Sicherheits-Challenge bestanden hat.
              consent: 'Dient der Funktionalität. Läuft nach 2 Jahren ab. Google nutzt dieses Cookie, um den Einwilligungsstatus eines Nutzers zu speichern. Weitere Informationen unter: Wie Google Cookies verwendet'
              decidim_consent: Speichert Informationen über die vom Nutzer auf dieser Website erlaubten Cookies.
              emoji_picker_recent: Speichert die zuletzt ausgewählten Emojis
              facebook_fr: Wird von Meta verwendet, um Werbeanzeigen auszuliefern, zu messen und deren Relevanz zu verbessern.
              fbp: Identifiziert Browser-Sitzungen für das Facebook-Pixel-Tracking.
              ga_gat: Wird verwendet, um die Anfragerate an Google Analytics zu drosseln.
              ga_gid: Wird verwendet, um Nutzer zu unterscheiden. Läuft nach 24 Stunden ab.
              ga_main: Wird verwendet, um Nutzer durch Zuweisung einer eindeutigen Kennung zu unterscheiden.
              ga_property: Wird in GA4 verwendet, um den Sitzungsstatus und Zähler für eine bestimmte Property beizubehalten.
              graphiql_doc_explorer_open: Speichert, ob das Dokumentationspanel bei der Nutzung der GraphQL-API geöffnet ist
              graphiql_editor_flex: Speichert die Tab-Präferenz bei der Nutzung der GraphQL-API
              graphiql_history_pane_open: Speichert, ob das Verlaufspanel bei der Nutzung der GraphQL-API geöffnet ist
              graphiql_queries: Speichert den Abfrageverlauf bei der Nutzung der GraphQL-API
              graphiql_query: Speichert die letzte Abfrage bei der Nutzung der GraphQL-API
              graphiql_tab_state: Speichert die Tab-Konfiguration bei der Nutzung der GraphQL-API
              gtm_dc: Wird von Google Tag Manager für das Tag-Laden und die Diagnose verwendet.
              gtm_debug: Speichert den Debug-Modus-Status von Google Tag Manager.
              gtm_gcl_au: Wird von Google-Diensten verwendet, um die Werbeeffizienz zu testen.
              hcaptcha_accessibility: Speichert Barrierefreiheits-Einstellungen für hCaptcha-Challenges.
              hcaptcha_session: Speichert den temporären hCaptcha-Sitzungsstatus zur Validierung von Challenges.
              jitsi_amp: Wird für Amplitude Analytics verwendet
              jitsi_amplitude_unsent_identify: Wird für Amplitude Analytics verwendet
              jitsi_amplitude_unset: Wird für Amplitude Analytics verwendet
              jitsi_calendar_sync: Wird für die Kalender-Synchronisationsfunktion verwendet.
              jitsi_callstats_username: Wird zum Speichern der Nutzersitzung in Jitsi verwendet.
              jitsi_dropbox: Wird für die Dropbox-Integrationsfunktion verwendet.
              jitsi_endpoint_id: Wird für die Kommunikation mit dem Jitsi-Server verwendet.
              jitsi_known_domains: Speichert eine Liste bekannter Domains
              jitsi_language: Speichert die Spracheinstellung
              jitsi_prejoin: Wird für die Vorab-Beitrittsbildschirm-Funktion verwendet.
              jitsi_recent_list: Wird für die Zuletzt-verwendet-Listenfunktion verwendet.
              jitsi_settings: Speichert die Jitsi-Einstellungen.
              jitsi_video_quality: Wird für die persistente Videoquali-Speicherfunktion verwendet.
              jitsi_virtual_background: Wird für die virtuelle Hintergrundfunktion verwendet.
              linkedin_li_gc: Speichert den Einwilligungsstatus für LinkedIn-Dienste.
              linkedin_lidc: Wird von LinkedIn für Routing und Lastverteilung verwendet.
              linkedin_user_match_history: Verfolgt Anzeigeninteraktionszeitpunkte und Konversionszuordnung für LinkedIn-Kampagnen.
              maps_1p_jar: Speichert Google-Maps-Nutzungspräferenzen und Signale zur Anzeigenpersonalisierung.
              maps_consent: Speichert den Einwilligungsstatus des Nutzers für Google-Dienste bei der Verwendung von eingebetteten Karten.
              maps_nid: Speichert Google-Maps-Präferenzen und sicherheitsrelevante Browser-Informationen.
              matomo_mtm_consent: Speichert den Einwilligungsstatus des Nutzers für das Matomo-Tracking.
              matomo_pk_id: Wird verwendet, um eine eindeutige Besucher-ID zu speichern und wiederkehrende Besucher zu identifizieren.
              matomo_pk_ref: Wird verwendet, um Attributionsdaten zu speichern (die Quelle, die den Nutzer auf die Website geführt hat).
              matomo_pk_ses: Wird verwendet, um temporäre Sitzungsdaten des aktuellen Besuchs zu speichern.
              osm_location: Speichert Standard-Orts- und Zoomwerte für OpenStreetMap-Interaktionen.
              osm_session: Speichert temporäre Sitzungsdaten für OpenStreetMap-Nutzerinteraktionen.
              osm_totp_token: Speichert temporäre 2FA-Token-Daten für OpenStreetMap-Konto-Workflows.
              pref: 'Dient der Funktionalität. YouTube verwendet dieses Cookie, um Informationen wie bevorzugte Seiteneinstellungen und Wiedergabepräferenzen zu speichern. Weitere Informationen unter: Wie Google Cookies verwendet'
              recaptcha_grecaptcha: Wird von reCAPTCHA zum Spam-Schutz und zur Risikoanalyse verwendet.
              recaptcha_rc_a: Speichert reCAPTCHA-Risikoanalyse-Metadaten im Browser-Speicher.
              recaptcha_rc_c: Speichert reCAPTCHA-Challenge/Sitzungs-Metadaten im Browser-Speicher.
              remember_user_token: Ermöglicht das Offenhalten der Sitzung, wenn beim Anmelden auf "Angemeldet bleiben" geklickt wird.
              session_id: Ermöglicht es Websites, den Nutzer beim Navigieren zwischen Seiten zu erkennen.
              vimeo_player: Speichert Vimeo-Player-Einstellungen wie Lautstärke, Qualität oder Autoplay-Verhalten.
              vimeo_vuid: Speichert eine eindeutige Vimeo-Besucher-Kennung für Analysezwecke.
              visitor_info1_live: 'Wird für Funktionalität, Analysen, Werbung und Personalisierung verwendet. Weitere Informationen unter: Wie Google Cookies verwendet'
              ysc: 'Dient der Sicherheit. Gilt für die Dauer der Browser-Sitzung. Verhindert, dass bösartige Websites im Namen eines Nutzers handeln. Weitere Informationen unter: Wie Google Cookies verwendet'
              yt_remote_connected_devices: Speichert die Liste verbundener Geräte für YouTube-Player-Fernsteuerungen.
              yt_remote_device_id: Speichert eine Gerätekennung für YouTube-Player-Fernbedienungsinteraktionen.
              ytidb_last_result_entry_key: Speichert die neuesten YouTube-Player-Ergebnismetadaten im lokalen Speicher.

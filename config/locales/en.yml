              linkedin_li_gc: Stores consent state for LinkedIn services.
              linkedin_lidc: Used by LinkedIn for routing and load balancing.
              linkedin_user_match_history: Tracks ad interaction timing and conversion
                attribution for LinkedIn campaigns.
              maps_1p_jar: Stores Google Maps usage/preferences and ad personalization
                signals.
              maps_consent: Stores user consent state for Google services when using
                maps embeds.
              maps_nid: Stores Google Maps preferences and security-related browser
                information.
              matomo_mtm_consent: Stores the user's consent status for Matomo tracking.
              matomo_pk_id: Used to store a unique visitor ID and identify returning
                visitors.
              matomo_pk_ref: Used to store attribution information (the referrer that
                brought the user to the website).
              matomo_pk_ses: Used to store temporary session data for the current
                visit.
              osm_location: Stores map location/zoom defaults for OpenStreetMap interactions.
              osm_session: Stores temporary session data for OpenStreetMap user interactions.
              osm_totp_token: Stores temporary 2FA-related token data for OpenStreetMap
                account workflows.
              pref: Used for functionality. YouTube uses this cookie to store information
                such as your preferred page configuration and playback preferences
                like explicit autoplay choices, shuffle content, and player size.
                Read more at How Google uses cookies
              recaptcha_grecaptcha: Used by reCAPTCHA to provide spam protection and
                risk analysis.
              recaptcha_rc_a: Stores reCAPTCHA risk analysis metadata in browser storage.
              recaptcha_rc_c: Stores reCAPTCHA challenge/session metadata in browser
                storage.
              remember_user_token: Allows to keep your session open if you click on
                "Remember me" when logging in.
              session_id: Allows websites to remember user within a website when they
                move between web pages.
              turnstile_cf_bm: Helps Cloudflare detect and mitigate automated traffic.
              turnstile_cf_clearance: Stores proof that a visitor passed a previous
                security challenge.
              turnstile_cfuvid: Helps Cloudflare distinguish individual users sharing
                the same IP address.
              vimeo_player: Stores Vimeo player preferences such as volume, quality,
                or autoplay behavior.
              vimeo_vuid: Stores a unique Vimeo visitor identifier used for analytics.
              visitor_info1_live: Used for functionality, analytics, advertising,
                and personalization. Read more at How Google uses cookies
              ysc: Used for security. Lasts for the duration of a user's browsing
                session. Used to ensure that requests within a browsing session are
                made by the user, and not by other sites. This cookie prevents malicious
                sites from acting on behalf of a user without that user's knowledge.
                Read more at How Google uses cookies
              yt_remote_connected_devices: Stores list of connected devices for YouTube
                player controls.
              yt_remote_device_id: Stores a device identifier for YouTube player remote
                interactions.
              ytidb_last_result_entry_key: Stores the latest YouTube player result
                metadata in local storage.
            explanations:
              cloudflare_turnstile: |-
                Add these cookies when Cloudflare Turnstile is enabled to protect forms against abuse and automated traffic. They support bot detection, session validation, and challenge continuity.

                Recommended category: Essential
              decidim_essential: |-
                Add these essential cookies that are required for the core functionality of your Decidim platform. These cookies enable user authentication, session management, and consent tracking.

                Recommended category: Essential
              emoji_picker: |-
                Add this cookie when you enable the emoji picker feature in text editors. It stores recently used emojis to personalize the user experience.

                Recommended category: Preferences
              facebook_pixel: |-
                Add these cookies when you use Meta (Facebook) Pixel for conversion tracking or ad attribution. They help identify browser sessions and measure campaign performance.

                Recommended category: Marketing
              google_analytics: |-
                Add these cookies when you use Google Analytics (GA4/gtag.js) to measure traffic and user behavior. They identify visitors, distinguish sessions, and help generate usage statistics.

                Recommended category: Analytics
              google_maps_embeds: |-
                Add these cookies when embedding Google Maps on your pages (for example, map widgets or location blocks). They help with map preferences, consent state, and usage metrics.

                Recommended category: Preferences or Analytics
              google_tag_manager: |-
                Add these cookies when your analytics or marketing tags are delivered through Google Tag Manager. Some tags can set additional tracking cookies based on your GTM configuration.

                Recommended category: Analytics or Marketing
              graphiql: |-
                Add these cookies when you enable the GraphQL API explorer (/api/graphiql) for developers. They store the explorer's interface preferences, query history, and tab configurations.

                Recommended category: Preferences
              hcaptcha: |-
                Add these cookies/storage entries when hCaptcha is enabled in forms. They are used for bot detection, accessibility options, and challenge/session handling.

                Recommended category: Essential
              jitsi_meet: |-
                Add these cookies when you integrate Jitsi Meet video conferencing meetings in your platform. They store user settings, language preferences, video quality options, and session data for the video conferencing service.

                Recommended category: Preferences
              linkedin_insight: |-
                Add these cookies when using the LinkedIn Insight Tag to measure campaign performance and visitor conversions from LinkedIn ads.

                Recommended category: Marketing
              matomo: |-
                Add these cookies when you use Matomo analytics to collect website statistics. They identify returning visitors, track sessions, and store referral information used for aggregated reports.

                Recommended category: Analytics
              openstreetmap_tiles: |-
                Add these cookies when your map experience depends on OpenStreetMap-hosted resources that may set cookies (for example embedded maps or OSM account-aware features).

                Recommended category: Preferences
              recaptcha: |-
                Add these cookies/storage entries when Google reCAPTCHA protects forms against abuse and bots. They help evaluate user interactions and security signals.

                Recommended category: Essential
              vimeo_embeds: |-
                Add these cookies when you embed Vimeo videos in pages, proposals, or comments. Vimeo can use them to remember player settings and measure playback interactions.

                Recommended category: Preferences or Analytics
              youtube_embeds: |-
                Add these cookies when you allow YouTube video embeds in content (proposals, comments, etc.). YouTube sets analytics and tracking cookies that collect information about video playback and user behavior.

                Recommended category: Preferences (if the videos are an integral part of the content), Analytics (for tracking/statistics) or Marketing (if used for advertising purposes)
              youtube_nocookie: |-
                Add these storage keys when you use YouTube's privacy-enhanced mode (youtube-nocookie.com). They are used to persist player state and device/session preferences.

                Recommended category: Preferences

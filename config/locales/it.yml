              Questo strumento consente di eliminare tutti i dati privati per uno spazio o componente partecipativo specifico. Questa azione è irreversibile e rimuoverà tutti i dati privati dal database.
              <br><br>
              <strong>Cosa si considera dati privati?</strong>
              <br>
              I dati privati sono qualsiasi informazione che non è disponibile pubblicamente e è accessibile solo agli amministratori. Questo, al momento, include informazioni sui campi personalizzati privati.
              <br><br>
              <strong>Cosa succede quando elimino i dati privati?</strong>
              <br>
              Quando si eliminano i dati privati, tutte le informazioni private per lo spazio o componente partecipativo selezionato verranno rimosse definitivamente dal database. Un registro di questa azione sarà memorizzato nel sistema a scopo di audit.
              <br><br>
              <strong>Cosa succede ai dati pubblici?</strong>
              <br>
              I dati pubblici non saranno influenzati da questa azione. Saranno eliminati solo i dati privati.
              <br><br>
              <strong>C'è un tempo minimo da attendere prima di eliminare i dati privati?</strong>
              <br>
              Sì, non è possibile eliminare i dati privati se l'ultimo aggiornamento è stato meno di %{time_ago} fa. Puoi modificare questa configurazione nel file inizializzatore.
            items_count: Totale interessato

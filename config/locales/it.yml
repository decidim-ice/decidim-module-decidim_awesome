          cookie_item_presets:
            descriptions:
              consent: Usato per la funzionalità. Dura 2 anni; Google lo usa per memorizzare lo stato dell'utente rispetto alle sue scelte sui cookie. Maggiori informazioni su come Google utilizza i cookie.
              decidim_consent: Memorizza informazioni sui cookie consentiti dall'utente su questo sito web.
              emoji_picker_recent: Memorizza le emoji selezionate più di recente
              facebook_fr: Usato da Meta per distribuire, misurare e migliorare la pertinenza degli annunci.
              fbp: Identifica le sessioni del browser per il tracciamento con Facebook Pixel.
              ga_gat: Usato per limitare la frequenza delle richieste inviate a Google Analytics.
              ga_gid: Usato per distinguere gli utenti a fini analitici. Scade dopo 24 ore.
              ga_main: Usato per distinguere gli utenti assegnando un identificatore univoco.
              ga_property: Usato in GA4 per mantenere lo stato della sessione e i contatori di una proprietà specifica.
              graphiql_doc_explorer_open: Salva se il pannello della documentazione è aperto quando usi l'API GraphQL
              graphiql_editor_flex: Salva la tua preferenza di scheda quando usi l'API GraphQL
              graphiql_history_pane_open: Salva se il pannello della cronologia è aperto quando usi l'API GraphQL
              graphiql_queries: Salva la cronologia delle tue query quando usi l'API GraphQL
              graphiql_query: Salva la tua ultima query quando usi l'API GraphQL
              graphiql_tab_state: Salva la configurazione delle tue schede quando usi l'API GraphQL
              gtm_dc: Usato da Google Tag Manager per il caricamento dei tag e la diagnostica.
              gtm_debug: Memorizza lo stato della modalità di debug di Google Tag Manager.
              gtm_gcl_au: Usato dai servizi Google per sperimentare l'efficienza pubblicitaria.
              hcaptcha_accessibility: Memorizza preferenze relative all'accessibilità per le challenge di hCaptcha.
              hcaptcha_session: Memorizza lo stato temporaneo della sessione di hCaptcha per validare le challenge.
              jitsi_amp: Usato per Amplitude Analytics
              jitsi_amplitude_unsent_identify: Usato per Amplitude Analytics
              jitsi_amplitude_unset: Usato per Amplitude Analytics
              jitsi_calendar_sync: Usato per la funzione di sincronizzazione del calendario.
              jitsi_callstats_username: Usato per salvare la sessione utente su Jitsi.
              jitsi_dropbox: Usato per la funzione di integrazione con Dropbox.
              jitsi_endpoint_id: Usato per comunicare con il server Jitsi.
              jitsi_known_domains: Salva un elenco di domini noti
              jitsi_language: Salva la tua preferenza di lingua
              jitsi_prejoin: Usato per la schermata di pre-join.
              jitsi_recent_list: Usato per la funzione elenco recente.
              jitsi_settings: Usato per salvare le tue impostazioni di Jitsi.
              jitsi_video_quality: Usato per la memorizzazione persistente della qualità video.
              jitsi_virtual_background: Usato per la funzione di sfondo video.
              linkedin_li_gc: Memorizza lo stato del consenso per i servizi LinkedIn.
              linkedin_lidc: Usato da LinkedIn per instradamento e bilanciamento del carico.
              linkedin_user_match_history: Tiene traccia del momento dell'interazione con l'annuncio e dell'attribuzione delle conversioni per le campagne LinkedIn.
              maps_1p_jar: Memorizza l'uso/le preferenze di Google Maps e i segnali di personalizzazione degli annunci.
              maps_consent: Memorizza lo stato del consenso dell'utente per i servizi Google quando si usano mappe incorporate.
              maps_nid: Memorizza le preferenze di Google Maps e le informazioni del browser relative alla sicurezza.
              matomo_mtm_consent: Memorizza lo stato del consenso dell'utente per il tracciamento Matomo.
              matomo_pk_id: Usato per memorizzare un identificatore visitatore univoco e riconoscere i visitatori di ritorno.
              matomo_pk_ref: Usato per memorizzare informazioni di attribuzione (la fonte che ha portato l'utente al sito web).
              matomo_pk_ses: Usato per memorizzare dati temporanei di sessione per la visita corrente.
              osm_location: Memorizza i valori predefiniti di posizione/zoom della mappa per le interazioni con OpenStreetMap.
              osm_session: Memorizza dati temporanei di sessione per le interazioni degli utenti con OpenStreetMap.
              osm_totp_token: Memorizza dati temporanei dei token 2FA per i flussi di lavoro dell'account OpenStreetMap.
              pref: Usato per la funzionalità. YouTube usa questo cookie per memorizzare informazioni come la configurazione di pagina preferita e le preferenze di riproduzione. Maggiori informazioni su come Google utilizza i cookie.
              recaptcha_grecaptcha: Usato da reCAPTCHA per fornire protezione dallo spam e analisi del rischio.
              recaptcha_rc_a: Memorizza metadati di analisi del rischio di reCAPTCHA nell'archiviazione del browser.
              recaptcha_rc_c: Memorizza metadati di challenge/sessione di reCAPTCHA nell'archiviazione del browser.
              remember_user_token: Permette di mantenere aperta la sessione se fai clic su "Ricordami" durante l'accesso.
              session_id: Permette ai siti web di ricordare l'utente mentre si sposta tra le pagine.
              turnstile_cf_bm: Aiuta Cloudflare a rilevare e mitigare il traffico automatizzato.
              turnstile_cf_clearance: Memorizza la prova che un visitatore ha superato una precedente challenge di sicurezza.
              turnstile_cfuvid: Aiuta Cloudflare a distinguere i singoli utenti che condividono lo stesso indirizzo IP.
              vimeo_player: Memorizza le preferenze del lettore Vimeo, come volume, qualità o comportamento dell'autoplay.
              vimeo_vuid: Memorizza un identificatore univoco del visitatore Vimeo usato per l'analisi.
              visitor_info1_live: Usato per funzionalità, analisi, pubblicità e personalizzazione. Maggiori informazioni su come Google utilizza i cookie.
              ysc: Usato per la sicurezza. Dura per l'intera sessione di navigazione dell'utente. Impedisce che siti malevoli agiscano per conto dell'utente.
              yt_remote_connected_devices: Memorizza l'elenco dei dispositivi connessi per i controlli remoti del lettore YouTube.
              yt_remote_device_id: Memorizza un identificatore di dispositivo per le interazioni remote con il lettore YouTube.
              ytidb_last_result_entry_key: Memorizza gli ultimi metadati dei risultati del lettore YouTube nell'archiviazione locale.
            explanations:
              cloudflare_turnstile: |-
                Aggiungi questi cookie quando Cloudflare Turnstile è abilitato per proteggere i moduli da abusi e traffico automatizzato. Supportano il rilevamento dei bot, la validazione della sessione e la continuità della challenge.

                Categoria consigliata: Essenziale
              decidim_essential: |-
                Aggiungi questi cookie essenziali necessari per il funzionamento di base della tua piattaforma Decidim. Questi cookie consentono l'autenticazione degli utenti, la gestione delle sessioni e il monitoraggio del consenso.

                Categoria consigliata: Essenziale
              emoji_picker: |-
                Aggiungi questo cookie quando abiliti il selettore di emoji negli editor di testo. Memorizza le emoji usate di recente per personalizzare l'esperienza dell'utente.

                Categoria consigliata: Preferenze
              facebook_pixel: |-
                Aggiungi questi cookie quando usi Meta (Facebook) Pixel per il monitoraggio delle conversioni o l'attribuzione degli annunci. Aiutano a identificare le sessioni del browser e a misurare le prestazioni della campagna.

                Categoria consigliata: Marketing
              google_analytics: |-
                Aggiungi questi cookie quando usi Google Analytics (GA4/gtag.js) per misurare il traffico e il comportamento degli utenti. Identificano i visitatori, distinguono le sessioni e aiutano a generare statistiche d'uso.

                Categoria consigliata: Analitica
              google_maps_embeds: |-
                Aggiungi questi cookie quando incorpori Google Maps nelle tue pagine. Aiutano con le preferenze della mappa, lo stato del consenso e le metriche d'uso.

                Categoria consigliata: Preferenze o Analitica
              google_tag_manager: |-
                Aggiungi questi cookie quando i tuoi tag di analisi o marketing vengono distribuiti tramite Google Tag Manager. Alcuni tag possono impostare cookie di tracciamento aggiuntivi in base alla tua configurazione GTM.

                Categoria consigliata: Analitica o Marketing
              graphiql: |-
                Aggiungi questi cookie quando abiliti l'esploratore dell'API GraphQL (/api/graphiql) per gli sviluppatori. Memorizzano le preferenze dell'interfaccia, la cronologia delle query e le configurazioni delle schede.

                Categoria consigliata: Preferenze
              hcaptcha: |-
                Aggiungi questi cookie/voci di archiviazione quando hCaptcha è abilitato nei moduli. Sono usati per il rilevamento dei bot, le opzioni di accessibilità e la gestione di challenge/sessioni.

                Categoria consigliata: Essenziale
              jitsi_meet: |-
                Aggiungi questi cookie quando integri riunioni di videoconferenza Jitsi Meet nella tua piattaforma. Memorizzano impostazioni utente, preferenze di lingua, opzioni di qualità video e dati di sessione del servizio.

                Categoria consigliata: Preferenze
              linkedin_insight: |-
                Aggiungi questi cookie quando usi il LinkedIn Insight Tag per misurare le prestazioni delle campagne e le conversioni provenienti dagli annunci LinkedIn.

                Categoria consigliata: Marketing
              matomo: |-
                Aggiungi questi cookie quando usi Matomo per raccogliere statistiche sul sito web. Identificano i visitatori di ritorno, tracciano le sessioni e memorizzano informazioni di riferimento usate nei report aggregati.

                Categoria consigliata: Analitica
              openstreetmap_tiles: |-
                Aggiungi questi cookie quando l'esperienza della tua mappa dipende da risorse ospitate da OpenStreetMap che possono impostare cookie.

                Categoria consigliata: Preferenze
              recaptcha: |-
                Aggiungi questi cookie/voci di archiviazione quando Google reCAPTCHA protegge i moduli contro abusi e bot. Aiutano a valutare le interazioni dell'utente e i segnali di sicurezza.

                Categoria consigliata: Essenziale
              vimeo_embeds: |-
                Aggiungi questi cookie quando incorpori video Vimeo in pagine, proposte o commenti. Vimeo può usarli per ricordare le impostazioni del lettore e misurare le interazioni di riproduzione.

                Categoria consigliata: Preferenze o Analitica
              youtube_embeds: |-
                Aggiungi questi cookie quando permetti l'incorporamento di video YouTube nei contenuti. YouTube imposta cookie di analisi e tracciamento che raccolgono informazioni sulla riproduzione e sul comportamento degli utenti.

                Categoria consigliata: Preferenze, Analitica o Marketing
              youtube_nocookie: |-
                Aggiungi queste chiavi di archiviazione quando usi la modalità privacy avanzata di YouTube (youtube-nocookie.com). Servono a mantenere lo stato del lettore e le preferenze del dispositivo/sessione.

                Categoria consigliata: Preferenze

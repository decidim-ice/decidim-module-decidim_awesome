            help:
              allow_images_in_editors: Ciò aggiungerà un'icona per il caricamento di immagini in tutti gli editor WYSIWYG
              allow_images_in_proposals: Questo permetterà di caricare le immagini nell'editor delle proposte, disponibile per qualsiasi utente
              allow_videos_in_editors: Ciò aggiungerà un'icona per i link video in tutti gli editor WYSIWYG
              auto_save_forms: Questo utilizzerà LocalStorage per salvare automaticamente i dati introdotti dagli utenti nei sondaggi e in altri moduli durante il riempimento. I dati verranno ripristinati in una visita futura con lo stesso browser nel caso in cui il modulo non venga inviato. Se il modulo viene inviato, i dati verranno rimossi. Se gli utenti rimuoveranno i dati di LocalStorage, i dati non verranno ripristinati.
              drag_and_drop_supported: Quando si caricano le immagini, è supportato il Drag & Drop. Le immagini verranno caricate sul server e inserite come risorse esterne (non utilizza la codifica base64).
              force_authorization_help_text: Aggiungi un testo personalizzato per spiegare perché è richiesta l'autorizzazione. Assicurati anche di aggiungere un metodo di contatto nel caso in cui gli utenti abbiano bisogno di aiuto.
              hashcash_i18n_key: 'Puoi personalizzare il testo che viene mostrato agli utenti nei pulsanti di invio login/registrazione con la chiave i18n: %{key}'
              hashcash_login: |
                Proteggi le applicazioni Rails contro bot e attacchi di forza bruta senza infastidire gli umani.
                Hashcash è un sistema proof-of-work che richiede agli utenti di risolvere un puzzle computazionale (eseguito automaticamente dal browser) prima di poter effettuare il login.
              hashcash_login_bits: Questo parametro definisce il numero di bit che l'algoritmo Hashcash utilizzerà per generare la proof-of-work. Si raccomanda di utilizzare un valore tra 16 (facile) e 30 (estremamente difficile) bit. Il valore predefinito per i moduli di login è %{bits} bit.
              hashcash_signup: |
                Proteggi le applicazioni Rails contro bot e attacchi di forza bruta senza infastidire gli umani.
                Hashcash è un sistema proof-of-work che richiede agli utenti di risolvere un puzzle computazionale (eseguito automaticamente dal browser) prima di potersi registrare.
              hashcash_signup_bits: Questo parametro definisce il numero di bit che l'algoritmo Hashcash utilizzerà per generare la proof-of-work. Si raccomanda di utilizzare un valore tra 16 (facile) e 30 (estremamente difficile) bit. Il valore predefinito per i moduli di registrazione è %{bits} bit.
              intergram_about: Intergram utilizza Telegram messenger per gestire un widget di chat di supporto live incorporato nella parte inferiore della pagina.
              intergram_config: 'Invita il bot <a href="https://web.telegram.org/#/im?p=@IntergramBot">@Intergram</a> al tuo gruppo o avvia una chat direttamente con esso. <a href="https://github.com/idoco/intergram#embed-intergram-in-your-website-with-these-2-simple-steps">+ info</a>'
              original_editor_override: Poiché dalla versione 0.26 di decidim, è gi§à possibile (solo per gli amministratori) caricare le immagini negli editor. Pertanto, le impostazioni delle immagini si applicano solo agli editor pubblici (per gli admin sono sempre disponibili).
              proposal_custom_fields: Crea campi di proposta personalizzati che si applicano solo in alcune parti del sito (usa l'editor delle restrizioni per quello)
              proposal_custom_fields_example: I dati sono memorizzati in un oggetto XML utilizzando attributi HTML compatibili (dl,dt,dd elementi) sostituendo il "corpo" in una proposta normale.
              proposal_custom_fields_translations: "Label, testo di aiuto, segnaposti e valori predefiniti possono utilizzare le traduzioni personalizzate della tua applicazione. \nPer questo, invece di usare delle string literal, utilizzare il tasto i18n (deve contenere almeno un punto).\nPer esempio:\n- \"activemodel.attributes.proposal.title\" al posto di \"Titolo\"\n- \"activemodel.attributes.proposal.address\" invece di \"Indirizzo\"\nO utilizzare le proprie chiavi in combinazione con altri strumenti per definire le traduzioni (ad esempio: utilizzando il modulo Term Customizer):\n - \"myapp.custom_fields.bio\" invece di \"Biografia\""
              proposal_private_custom_fields: Simile ai campi pubblici, ma questa informazione non sarà rivelata pubblicamente (solo gli amministratori avranno accesso ad essa).
              proposal_private_custom_fields_translations: |
                I campi personalizzati privati vengono visualizzati in una casella distinta con questo testo informativo:
                %{warning}
                Questo testo può essere personalizzato con una traduzione personalizzata utilizzando la chiave:
                %{key}
              scoped_admin_styles: Tieni presente che nascondere le cose qui potrebbe rendere l'amministratore inutilizzabile. Si prega di agire con cautela.
              scoped_admin_styles_variables: 'È possibile utilizzare le seguenti variabili CSS per i colori personalizzati dell''organizzazione:'
              scoped_admin_styles_warning: "<strong>Attenzione</strong>: Aggiungi qui CSS personalizzato che si applica solo in questo amministratore."
              scoped_admins: Promuovi l'utente ad admin che può amministrare solo alcune parti pubbliche (usa l'editor delle restrizioni). Gli utenti che hanno già i permessi di amministrazione verranno ignorati.
              scoped_styles: Crea CSS personalizzato che si applica solo in alcune parti del web pubblico (usa l'apposito editor delle restrizioni)
              scoped_styles_variables: 'È possibile utilizzare le seguenti variabili CSS per i colori personalizzati dell''organizzazione:'
              user_timezone: Ciò aggiungerà un campo di selezione nel profilo utente per impostare il fuso orario. Questo sarà utilizzato per mostrare date e orari nell'ora locale dell'utente.
              validate_body_max_caps_percent: Zero non permetterà a nessuna lettera maiuscola, 100 forzerà a scrivere tutto in lettere maiuscole
              validate_body_max_marks_together: 'Limita il numero di punti interrogativi e esclamativi che possono essere scritti insieme. Es.: se è 2, allora ''!!!'' non sarà permesso nel testo'
              validate_body_min_length: Questo numero può essere zero, questo renderà effettivamente questo campo non obbligatorio
              validate_title_max_caps_percent: Zero non permetterà nessuna lettera maiuscola, 100 forzerà a scrivere tutto in lettere maiuscole
              validate_title_max_marks_together: 'Limita il numero di punti interrogativi e esclamativi che possono essere scritti insieme. Es.: se è 2, allora ''!!!'' non sarà permesso nel testo'
              validate_title_min_length: Il titolo è sempre obbligatorio e questo numero non può essere zero
              verifications_html: |
                Qui puoi mettere ulteriori restrizioni di accesso a spazi o componenti partecipativi che obbligheranno gli utenti ad essere verificati prima di accedere a determinate posizioni (ad esempio: per prevenire spam).<br>
                Le restrizioni si applicano a tutti gli utenti ma gli amministratori avranno sempre accesso al pannello /admin.

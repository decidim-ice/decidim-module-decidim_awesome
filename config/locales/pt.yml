              jitsi_callstats_username: Utilizado para guardar a sessão do utilizador no Jitsi.
              jitsi_dropbox: Utilizado para a funcionalidade de integração com o Dropbox.
              jitsi_endpoint_id: Utilizado para comunicação com o servidor Jitsi.
              jitsi_known_domains: Guarda uma lista de domínios conhecidos
              jitsi_language: Guarda a preferência de idioma
              jitsi_prejoin: Utilizado para a funcionalidade de ecrã de pré-entrada.
              jitsi_recent_list: Utilizado para a funcionalidade de lista recente.
              jitsi_settings: Guarda as configurações do Jitsi.
              jitsi_video_quality: Utilizado para a funcionalidade de armazenamento persistente de qualidade de vídeo.
              jitsi_virtual_background: Utilizado para a funcionalidade de fundo de vídeo.
              linkedin_li_gc: Armazena o estado de consentimento para os serviços do LinkedIn.
              linkedin_lidc: Utilizado pelo LinkedIn para encaminhamento e balanceamento de carga.
              linkedin_user_match_history: Regista o tempo de interação com anúncios e a atribuição de conversões para campanhas do LinkedIn.
              maps_1p_jar: Armazena preferências de utilização do Google Maps e sinais de personalização de anúncios.
              maps_consent: Armazena o estado de consentimento do utilizador para os serviços Google ao utilizar mapas incorporados.
              maps_nid: Armazena preferências do Google Maps e informações de segurança do navegador.
              matomo_mtm_consent: Armazena o estado de consentimento do utilizador para o rastreamento do Matomo.
              matomo_pk_id: Utilizado para armazenar um ID único de visitante e identificar visitantes recorrentes.
              matomo_pk_ref: Utilizado para armazenar informações de atribuição (a fonte que trouxe o utilizador ao site).
              matomo_pk_ses: Utilizado para armazenar dados temporários de sessão da visita atual.
              osm_location: Armazena valores predefinidos de localização/zoom do mapa para interações com o OpenStreetMap.
              osm_session: Armazena dados temporários de sessão para interações de utilizadores com o OpenStreetMap.
              osm_totp_token: Armazena dados temporários de token 2FA para fluxos de trabalho de contas OpenStreetMap.
              pref: Utilizado para funcionalidade. O YouTube utiliza este cookie para armazenar informações como a configuração de página preferida e preferências de reprodução. Mais informações em Como o Google utiliza cookies
              recaptcha_grecaptcha: Utilizado pelo reCAPTCHA para proteção contra spam e análise de riscos.
              recaptcha_rc_a: Armazena metadados de análise de riscos do reCAPTCHA no armazenamento do navegador.
              recaptcha_rc_c: Armazena metadados de desafio/sessão do reCAPTCHA no armazenamento do navegador.
              remember_user_token: Permite manter a sessão aberta ao clicar em "Lembrar-me" ao iniciar sessão.
              session_id: Permite que os sites reconheçam o utilizador ao navegar entre páginas.
              vimeo_player: Armazena preferências do leitor Vimeo, como volume, qualidade ou comportamento de reprodução automática.
              vimeo_vuid: Armazena um identificador único de visitante do Vimeo utilizado para análise.
              visitor_info1_live: Utilizado para funcionalidade, análise, publicidade e personalização. Mais informações em Como o Google utiliza cookies
              ysc: Utilizado por segurança. Válido durante a sessão de navegação do utilizador. Impede que sites maliciosos ajam em nome de um utilizador sem o seu conhecimento. Mais informações em Como o Google utiliza cookies
              yt_remote_connected_devices: Armazena a lista de dispositivos ligados para controles remotos do leitor YouTube.
              yt_remote_device_id: Armazena um identificador de dispositivo para interações remotas do leitor YouTube.
              ytidb_last_result_entry_key: Armazena os metadados de resultado mais recentes do leitor YouTube no armazenamento local.

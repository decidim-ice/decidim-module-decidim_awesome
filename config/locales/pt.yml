        cookie_items:
          cookie_item_presets:
            explanations:
              cloudflare_turnstile: |-
                Adicione estes cookies quando o Cloudflare Turnstile estiver ativado para proteger formularios contra abuso e trafego automatizado. Eles suportam deteccao de bots, validacao de sessao e continuidade do desafio.

                Categoria recomendada: Essencial
              decidim_essential: |-
                Adicione estes cookies essenciais necessários para a funcionalidade principal da sua plataforma Decidim. Estes cookies permitem a autenticação de utilizadores, gestão de sessões e rastreamento de consentimento.

                Categoria recomendada: Essencial
              emoji_picker: |-
                Adicione este cookie quando ativar a funcionalidade do seletor de emojis nos editores de texto. Armazena emojis utilizados recentemente para personalizar a experiência do utilizador.

                Categoria recomendada: Preferências
              facebook_pixel: |-
                Adicione estes cookies quando utilizar o Meta (Facebook) Pixel para rastreamento de conversões ou atribuição de anúncios. Ajudam a identificar sessões do navegador e medir o desempenho de campanhas.

                Categoria recomendada: Marketing
              google_analytics: |-
                Adicione estes cookies quando utilizar o Google Analytics (GA4/gtag.js) para medir o tráfego e o comportamento dos utilizadores. Identificam visitantes, distinguem sessões e ajudam a gerar estatísticas de utilização.

                Categoria recomendada: Analítica
              google_maps_embeds: |-
                Adicione estes cookies quando incorporar o Google Maps nas suas páginas (por exemplo, widgets de mapa ou blocos de localização). Ajudam com preferências de mapa, estado de consentimento e métricas de utilização.

                Categoria recomendada: Preferências ou Analítica
              google_tag_manager: |-
                Adicione estes cookies quando as suas tags de análise ou marketing forem distribuídas através do Google Tag Manager. Algumas tags podem definir cookies de rastreamento adicionais com base na sua configuração GTM.

                Categoria recomendada: Analítica ou Marketing
              graphiql: |-
                Adicione estes cookies quando ativar o explorador de API GraphQL (/api/graphiql) para programadores. Armazenam as preferências de interface do explorador, o histórico de consultas e as configurações de separadores.

                Categoria recomendada: Preferências
              hcaptcha: |-
                Adicione estes cookies/entradas de armazenamento quando o hCaptcha estiver ativado nos formulários. São utilizados para deteção de bots, opções de acessibilidade e gestão de desafios/sessões.

                Categoria recomendada: Essencial
              jitsi_meet: |-
                Adicione estes cookies quando integrar reuniões de videoconferência Jitsi Meet na sua plataforma. Armazenam configurações do utilizador, preferências de idioma, opções de qualidade de vídeo e dados de sessão para o serviço de videoconferência.

                Categoria recomendada: Preferências
              linkedin_insight: |-
                Adicione estes cookies quando utilizar o LinkedIn Insight Tag para medir o desempenho de campanhas e conversões de visitantes provenientes de anúncios do LinkedIn.

                Categoria recomendada: Marketing
              matomo: |-
                Adicione estes cookies quando utilizar o Matomo Analytics para recolher estatísticas do site. Identificam visitantes recorrentes, rastreiam sessões e armazenam informações de referência utilizadas em relatórios agregados.

                Categoria recomendada: Analítica
              openstreetmap_tiles: |-
                Adicione estes cookies quando a experiência de mapa depender de recursos alojados no OpenStreetMap que possam definir cookies (por exemplo, mapas incorporados ou funcionalidades que requerem conta OSM).

                Categoria recomendada: Preferências
              recaptcha: |-
                Adicione estes cookies/entradas de armazenamento quando o Google reCAPTCHA proteger os formulários contra abusos e bots. Ajudam a avaliar as interações dos utilizadores e os sinais de segurança.

                Categoria recomendada: Essencial
              vimeo_embeds: |-
                Adicione estes cookies quando incorporar vídeos do Vimeo em páginas, propostas ou comentários. O Vimeo pode utilizá-los para memorizar as configurações do leitor e medir interações de reprodução.

                Categoria recomendada: Preferências ou Analítica
              youtube_nocookie: |-
                Adicione estas chaves de armazenamento quando utilizar o modo de privacidade melhorada do YouTube (youtube-nocookie.com). São utilizadas para manter o estado do leitor e as preferências de dispositivo/sessão.

                Categoria recomendada: Preferências
              youtube_embeds: |-
                Adicione estes cookies quando permitir a incorporação de vídeos do YouTube em conteúdos (propostas, comentários, etc.). O YouTube define cookies de análise e rastreamento que recolhem informações sobre a reprodução de vídeos e o comportamento dos utilizadores.

                Categoria recomendada: Preferências (se os vídeos forem parte integrante do conteúdo), Analítica (para rastreamento/estatísticas) ou Marketing (se utilizado para fins publicitários)
            descriptions:
              turnstile_cf_bm: Ajuda o Cloudflare a detetar e mitigar trafego automatizado.
              turnstile_cf_clearance: Armazena a prova de que um visitante passou um desafio de seguranca anterior.
              turnstile_cfuvid: Ajuda o Cloudflare a distinguir utilizadores individuais que partilham o mesmo endereco IP.
              consent: Utilizado para funcionalidade. Válido durante 2 anos. O Google utiliza-o para armazenar o estado de consentimento de um utilizador relativamente às suas escolhas de cookies. Mais informações em Como o Google utiliza cookies
              decidim_consent: Armazena informação sobre os cookies permitidos pelo utilizador neste site.
              emoji_picker_recent: Armazena os emojis selecionados mais recentemente
              facebook_fr: Utilizado pela Meta para publicar, medir e melhorar a relevância dos anúncios.
              fbp: Identifica sessões do navegador para rastreamento do Facebook Pixel.
              ga_gat: Utilizado para limitar a taxa de pedidos enviados ao Google Analytics.
              ga_gid: Utilizado para distinguir utilizadores para fins analíticos. Expira após 24 horas.

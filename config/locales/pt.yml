              auto_save_forms: Isto usara o LocalStorage para guardar automaticamente dados introduzidos pelos utilizadores em pesquisas e outros formularios enquanto eles o preenchem. Os dados serao restaurados em uma visita futura com o mesmo navegador, caso o formulario nao seja enviado. Se o formulario for enviado, os dados serao removidos. Se os utilizadores removerem seus dados de LocalStorage, os dados tambem nao serao restaurados.

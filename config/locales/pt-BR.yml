            done: Concluido
            help_html: |
              Esta ferramenta permite excluir todos os dados privados de um determinado espaco participativo ou componente. Esta acao e irreversivel e removera todos os dados privados do banco de dados.
              <br><br>
              <strong>O que e considerado dado privado?</strong>
              <br>
              Dados privados sao quaisquer informacoes nao publicas e acessiveis apenas por administradores. Isso, no momento, inclui informacoes de campos personalizados privados.
              <br><br>
              <strong>O que acontece quando excluo dados privados?</strong>
              <br>
              Ao excluir dados privados, todas as informacoes privadas do espaco ou componente participativo selecionado serao removidas permanentemente do banco de dados. Um registro desta acao sera armazenado no sistema para fins de auditoria.
              <br><br>
              <strong>O que acontece com os dados publicos?</strong>
              <br>
              Dados publicos nao sao afetados por esta acao. Apenas dados privados serao excluidos.
              <br><br>
              <strong>Existe um tempo minimo de espera antes de excluir dados privados?</strong>
              <br>
              Sim, voce nao pode excluir dados privados se a ultima atualizacao foi ha menos de %{time_ago}. Voce pode alterar esta configuracao no arquivo inicializador.

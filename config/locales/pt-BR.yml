              validate_body_max_marks_together: 'Limitar o numero de pontos de interrogacao e exclamacao que podem ser escritos juntos. Por exemplo: se for 2, entao ''!!!'' nao sera permitido no texto'
              validate_body_min_length: Este numero pode ser zero, o que tornara este campo efetivamente nao obrigatorio

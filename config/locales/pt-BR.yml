              intergram_config: 'Convide o <a href="https://web.telegram.org/#/im?p=@IntergramBot">bot @Intergram</a> para seu grupo ou inicie um chat diretamente com ele. <a href="https://github.com/idoco/intergram#embed-intergram-in-your-website-with-these-2-simple-steps">+ informacoes</a>'
              original_editor_override: Desde a versao 0.26, e possivel (somente para administradores) enviar imagens para os editores. Portanto, as configuracoes de imagem aqui so afetam os editores publicos (administrador sempre tera as disponiveis).
              proposal_custom_fields: Crie campos personalizados de proposta que se aplicam somente em certas partes da web publica (use o editor de restricoes para isso)
              proposal_custom_fields_example: Os dados sao armazenados em um objeto XML usando atributos HTML compativeis (dl, dt, dd) substituindo o "corpo" em uma proposta normal.
              proposal_custom_fields_translations: "Titulos, texto de ajuda, espacos reservados e valores padrao podem usar traducoes personalizadas de sua aplicacao. \nPara isso, ao inves de usar uma string literal, use a chave i18n (ela deve conter pelo menos um ponto).\nPor exemplo:\n- \"activemodel.attributes.proposal.title\" em vez de \"Titulo\"\n- \"activemodel.attributes.proposal.address\" em vez de \"Endereco\"\nOu use suas proprias chaves em combinacao com outras ferramentas para definir traducoes (por exemplo: usando o modulo Term Customizer):\n - \"meuapp.custom_fields.bio\" em vez de \"Biografia\""
              proposal_private_custom_fields: Semelhante aos campos publicos, mas esta informacao nao sera divulgada publicamente (apenas administradores terao acesso).
              proposal_private_custom_fields_translations: |
                Campos personalizados privados sao exibidos em uma caixa distinta com este texto de informacao:
                %{warning}
                Este texto pode ser personalizado com uma traducao personalizada usando a chave:
                %{key}
              scoped_admin_styles: Esteja ciente de que ocultar coisas aqui pode tornar o administrador inutilizavel. Por favor, aja com cautela.
              scoped_admin_styles_variables: 'Voce pode usar as seguintes variaveis CSS para cores personalizadas da organizacao:'
              scoped_admin_styles_warning: "<strong>Aviso</strong>: Adicione aqui CSS personalizado que se aplica apenas neste administrador."
              scoped_admins: Promova usuarios regulares a administradores que podem administrar apenas certas partes da web publica (use o editor de restricoes para isso). Note que usuarios que ja possuem permissoes de administrador regulares serao ignorados.
              scoped_styles: Crie CSS personalizado que se aplica somente em certas partes da web publica (use o editor de restricoes para isso)
              scoped_styles_variables: 'Voce pode usar as seguintes variaveis CSS para cores personalizadas da organizacao:'
              user_timezone: Isto adicionara um campo de selecao no perfil do usuario para definir o fuso horario. Isso sera usado para mostrar datas e horarios no horario local do usuario.

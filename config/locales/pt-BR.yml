            help:
              allow_images_in_editors: Isto adicionara um icone de upload de imagem em todos os editores WYSIWYG
              allow_images_in_proposals: Isso permitira fazer upload de imagens no editor de propostas, disponivel para qualquer usuario
              allow_videos_in_editors: Isto adicionara um icone de link de video em todos os editores WYSIWYG
              auto_save_forms: Isto usara o LocalStorage para salvar automaticamente dados introduzidos pelos usuarios em pesquisas e outros formularios enquanto eles o preenchem. Os dados serao restaurados em uma visita futura com o mesmo navegador, caso o formulario nao seja enviado. Se o formulario for enviado, os dados serao removidos. Se os usuarios removerem seus dados de LocalStorage, os dados tambem nao serao restaurados.
              drag_and_drop_supported: Ao carregar imagens, arrastar e soltar e suportado. As imagens serao enviadas para o servidor e inseridas como recursos externos (nao usa codificacao base64 inline).
              force_authorization_help_text: Adicione um texto personalizado para explicar por que a autorizacao e necessaria. Certifique-se tambem de adicionar um metodo de contato caso os usuarios precisem de ajuda.
              hashcash_i18n_key: 'Voce pode personalizar o texto mostrado aos usuarios nos botoes de envio de login/cadastro com a chave i18n: %{key}'
              hashcash_login: |
                Proteja aplicacoes Rails contra bots e ataques de forca bruta sem incomodar humanos.
                Hashcash e um sistema de prova de trabalho que exige que os usuarios resolvam um quebra-cabeca computacional (realizado automaticamente pelo navegador) antes de poderem fazer login.
              hashcash_login_bits: Este parametro define o numero de bits que o algoritmo Hashcash usara para gerar a prova de trabalho. E recomendado usar um valor entre 16 (facil) e 30 (extremamente dificil) bits. O valor padrao para formularios de login e %{bits} bits.
              hashcash_signup: |
                Proteja aplicacoes Rails contra bots e ataques de forca bruta sem incomodar humanos.
                Hashcash e um sistema de prova de trabalho que exige que os usuarios resolvam um quebra-cabeca computacional (realizado automaticamente pelo navegador) antes de poderem se cadastrar.
              hashcash_signup_bits: Este parametro define o numero de bits que o algoritmo Hashcash usara para gerar a prova de trabalho. E recomendado usar um valor entre 16 (facil) e 30 (extremamente dificil) bits. O valor padrao para formularios de cadastro e %{bits} bits.

              recaptcha_rc_a: Almacena metadatos de análisis de riesgos de reCAPTCHA
                en el almacenamiento del navegador.
              recaptcha_rc_c: Almacena metadatos de desafío/sesión de reCAPTCHA en
                el almacenamiento del navegador.
              remember_user_token: Permite mantener la sesión abierta si haces clic
                en "Recuérdame" al iniciar sesión.
              session_id: Permite a los sitios web recordar al usuario dentro del
                sitio cuando se mueve entre páginas web.

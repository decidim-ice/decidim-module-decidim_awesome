              pref: Se usa para funcionalidad. YouTube usa esta cookie para almacenar
                información como la configuración de página preferida y preferencias
                de reproducción. Más información en Cómo Google usa las cookies
              recaptcha_grecaptcha: Usado por reCAPTCHA para proporcionar protección

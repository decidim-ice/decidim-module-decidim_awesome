              maps_1p_jar: Almacena preferencias de uso de Google Maps y señales de
                personalización de anuncios.
              maps_consent: Almacena el estado de consentimiento del usuario para
                los servicios de Google al usar mapas incrustados.
              maps_nid: Almacena las preferencias de Google Maps e información de
                seguridad del navegador.
              matomo_mtm_consent: Almacena el estado de consentimiento del usuario
                para el seguimiento de Matomo.
              matomo_pk_id: Usado para almacenar un ID de visitante único e identificar
                visitantes recurrentes.
              matomo_pk_ref: Usado para almacenar información de atribución (la fuente
                que llevó al usuario al sitio web).
              matomo_pk_ses: Usado para almacenar datos de sesión temporales de la

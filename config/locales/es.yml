                recomienda utilizar un valor entre 16 (fácil) y 30 bits (extremadamente
                duro). El valor por defecto para los formularios de inicio de sesión
                es %{bits} bits.
              hashcash_signup: |
                Protege las aplicaciones de las Rails contra bots y ataques de fuerza bruta sin molestar a los humanos.

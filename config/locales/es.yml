              jitsi_language: Guarda tu preferencia de idioma
              jitsi_prejoin: Usado para la función de pantalla de preunión.
              jitsi_recent_list: Usado para la función de lista reciente.
              jitsi_settings: Guarda tu configuración de Jitsi.
              jitsi_video_quality: Usado para la función de almacenamiento persistente

              turnstile_cf_clearance: Almacena la prueba de que una visitante superó
                un desafío de seguridad previo.
              turnstile_cfuvid: Ayuda a Cloudflare a distinguir usuarios individuales
                que comparten la misma dirección IP.
              vimeo_player: Almacena las preferencias del reproductor de Vimeo, como
                volumen, calidad o comportamiento de reproducción automática.
              vimeo_vuid: Almacena un identificador único de visitante de Vimeo utilizado
                para análisis.
              visitor_info1_live: Se usa para funcionalidad, análisis, publicidad
                y personalización. Más información en Cómo Google usa las cookies
              ysc: Se usa por seguridad. Dura la sesión de navegación del usuario.
                Evita que sitios maliciosos actúen en nombre de un usuario sin su
                conocimiento. Más información en Cómo Google usa las cookies
              yt_remote_connected_devices: Almacena la lista de dispositivos conectados
                para los controles remotos del reproductor de YouTube.
              yt_remote_device_id: Almacena un identificador de dispositivo para las
                interacciones remotas del reproductor de YouTube.
              ytidb_last_result_entry_key: Almacena los últimos metadatos de resultado
                del reproductor de YouTube en el almacenamiento local.
            explanations:
              cloudflare_turnstile: |-
                Añade estas cookies cuando Cloudflare Turnstile está habilitado para proteger formularios contra abuso y tráfico automatizado. Sirven para la detección de bots, la validación de sesión y la continuidad del desafío.

                Categoría recomendada: Esencial
              decidim_essential: |-
                Añade estas cookies esenciales requeridas para el funcionamiento principal de tu plataforma Decidim. Estas cookies habilitan la autenticación de usuarios, la gestión de sesiones y el seguimiento del consentimiento.

                Categoría recomendada: Esencial
              emoji_picker: |-
                Añade esta cookie cuando habilites la función del selector de emojis en los editores de texto. Almacena los emojis usados recientemente para personalizar la experiencia del usuario.

                Categoría recomendada: Preferencias
              facebook_pixel: |-
                Añade estas cookies cuando uses Meta (Facebook) Pixel para el seguimiento de conversiones o la atribución de anuncios. Ayudan a identificar sesiones de navegador y medir el rendimiento de las campañas.

                Categoría recomendada: Marketing
              google_analytics: |-
                Añade estas cookies cuando uses Google Analytics (GA4/gtag.js) para medir el tráfico y el comportamiento de los usuarios. Identifican visitantes, distinguen sesiones y ayudan a generar estadísticas de uso.

                Categoría recomendada: Analítica
              google_maps_embeds: |-
                Añade estas cookies cuando incrustes Google Maps en tus páginas (por ejemplo, widgets de mapa o bloques de ubicación). Ayudan con las preferencias del mapa, el estado del consentimiento y las métricas de uso.

                Categoría recomendada: Preferencias o Analítica
              google_tag_manager: |-
                Añade estas cookies cuando tus etiquetas de análisis o marketing se distribuyan a través de Google Tag Manager. Algunas etiquetas pueden establecer cookies de seguimiento adicionales según tu configuración de GTM.

                Categoría recomendada: Analítica o Marketing
              graphiql: |-
                Añade estas cookies cuando habilites el explorador de API GraphQL (/api/graphiql) para desarrolladores. Almacenan las preferencias de interfaz del explorador, el historial de consultas y las configuraciones de pestañas.

                Categoría recomendada: Preferencias
              hcaptcha: |-
                Añade estas cookies/entradas de almacenamiento cuando hCaptcha esté habilitado en los formularios. Se usan para la detección de bots, opciones de accesibilidad y el manejo de desafíos/sesiones.

                Categoría recomendada: Esencial
              jitsi_meet: |-
                Añade estas cookies cuando integres reuniones de videoconferencia de Jitsi Meet en tu plataforma. Almacenan la configuración del usuario, preferencias de idioma, opciones de calidad de vídeo y datos de sesión para el servicio de videoconferencia.

                Categoría recomendada: Preferencias
              linkedin_insight: |-
                Añade estas cookies cuando uses el LinkedIn Insight Tag para medir el rendimiento de campañas y las conversiones de visitantes desde anuncios de LinkedIn.

                Categoría recomendada: Marketing
              matomo: |-
                Añade estas cookies cuando uses Matomo analytics para recopilar estadísticas del sitio web. Identifican visitantes recurrentes, realizan seguimiento de sesiones y almacenan información de referencia utilizada para informes agregados.

                Categoría recomendada: Analítica
              openstreetmap_tiles: |-
                Añade estas cookies cuando la experiencia de tu mapa dependa de recursos alojados en OpenStreetMap que puedan establecer cookies (por ejemplo, mapas incrustados o funciones que requieren cuenta OSM).

                Categoría recomendada: Preferencias
              recaptcha: |-
                Añade estas cookies/entradas de almacenamiento cuando Google reCAPTCHA proteja los formularios contra abusos y bots. Ayudan a evaluar las interacciones de los usuarios y las señales de seguridad.

                Categoría recomendada: Esencial
              vimeo_embeds: |-
                Añade estas cookies cuando incrustes vídeos de Vimeo en páginas, propuestas o comentarios. Vimeo puede usarlas para recordar la configuración del reproductor y medir las interacciones de reproducción.

                Categoría recomendada: Preferencias o Analítica
              youtube_embeds: |-
                Añade estas cookies cuando permitas incrustar vídeos de YouTube en el contenido (propuestas, comentarios, etc.). YouTube establece cookies de análisis y seguimiento que recopilan información sobre la reproducción de vídeos y el comportamiento de los usuarios.

                Categoría recomendada: Preferencias (si los vídeos son parte integral del contenido), Analítica (para seguimiento/estadísticas) o Marketing (si se usa con fines publicitarios)
              youtube_nocookie: |-
                Añade estas claves de almacenamiento cuando uses el modo de privacidad mejorada de YouTube (youtube-nocookie.com). Se usan para mantener el estado del reproductor y las preferencias de dispositivo/sesión.

                Categoría recomendada: Preferencias
